name: Build Linux

on:
  workflow_call:

env:
  BUILD_TESTS: ON
  BUILD_CCACHE: ON
  BUILD_PCH: ON
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_MAXSIZE: 1G
  CCACHE_COMPILERCHECK: content
  CCACHE_SLOPPINESS: pch_defines,time_macros

jobs:
  fedora:
    name: Fedora (${{matrix.fedora_version}}, ${{ matrix.runner.arch }})
    runs-on: ${{ matrix.runner.os }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
        fedora_version: ['42', '43', '44']
    container:
      image: fedora:${{matrix.fedora_version}}
    steps:
      - name: Install git
        run: |
          dnf -y install git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Dependencies
        run: |
          ./ci/fedora-depends.sh

      - name: Cache ccache
        if: env.BUILD_CCACHE == 'ON'
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: linux-fedora-${{ matrix.fedora_version }}-${{ matrix.runner.arch }}-ccache-${{ github.sha }}
          restore-keys: |
            linux-fedora-${{ matrix.fedora_version }}-${{ matrix.runner.arch }}-ccache-

      - name: Build
        run: |
          ./ci/fedora-build.sh

      - name: Run tests
        if: env.BUILD_TESTS == 'ON'
        run: |
          ./ci/tests.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: fedora-${{matrix.fedora_version}}-${{ matrix.runner.arch }}
          path: rpm

  debian:
    name: Debian (${{matrix.debian_version}}, ${{ matrix.runner.arch }})
    runs-on: ${{ matrix.runner.os }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
        debian_version: ['bookworm', 'trixie', 'forky']
    container:
      image: debian:${{matrix.debian_version}}
    steps:
      - name: Install git
        run: |
          apt-get update -qq
          apt-get install -qq --yes ca-certificates git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Dependencies
        run: |
          ./ci/ubuntu-depends.sh

      - name: Install GTest
        run: |
          cd /usr/src/gtest
          cmake .
          make
          cp lib/*.a /usr/lib
          ln -sf /usr/lib/libgtest.a /usr/local/lib/libgtest.a
          ln -sf /usr/lib/libgtest_main.a /usr/local/lib/libgtest_main.a

      - name: Cache ccache
        if: env.BUILD_CCACHE == 'ON'
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: linux-debian-${{ matrix.debian_version }}-${{ matrix.runner.arch }}-ccache-${{ github.sha }}
          restore-keys: |
            linux-debian-${{ matrix.debian_version }}-${{ matrix.runner.arch }}-ccache-

      - name: Build
        run: |
          ./ci/ubuntu-build.sh

      - name: Run tests
        if: env.BUILD_TESTS == 'ON'
        run: |
          ./ci/tests.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: debian-${{matrix.debian_version}}-${{ matrix.runner.arch }}
          path: deb

  ubuntu:
    name: Ubuntu (${{matrix.ubuntu_version}}, ${{ matrix.runner.arch }})
    runs-on: ${{ matrix.runner.os }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
        ubuntu_version: ['noble', 'questing', 'resolute']
    container:
      image: ubuntu:${{matrix.ubuntu_version}}
    steps:
      - name: Install git
        run: |
          apt-get update -qq
          apt-get install -qq --yes ca-certificates git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Dependencies
        run: |
          ./ci/ubuntu-depends.sh

      - name: Install GTest
        run: |
          cd /usr/src/gtest
          cmake .
          make
          cp lib/*.a /usr/lib
          ln -sf /usr/lib/libgtest.a /usr/local/lib/libgtest.a
          ln -sf /usr/lib/libgtest_main.a /usr/local/lib/libgtest_main.a

      - name: Cache ccache
        if: ${{ !(matrix.ubuntu_version == 'noble' && matrix.runner.arch == 'amd64') && env.BUILD_CCACHE == 'ON' }}
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: linux-ubuntu-${{ matrix.ubuntu_version }}-${{ matrix.runner.arch }}-ccache-${{ github.sha }}
          restore-keys: |
            linux-ubuntu-${{ matrix.ubuntu_version }}-${{ matrix.runner.arch }}-ccache-

      - name: Build
        env:
          BUILD_CCACHE: ${{ matrix.ubuntu_version == 'noble' && matrix.runner.arch == 'amd64' && 'OFF' || env.BUILD_CCACHE }}
          BUILD_PCH: ${{ matrix.ubuntu_version == 'noble' && matrix.runner.arch == 'amd64' && 'OFF' || env.BUILD_PCH }}
        run: |
          ./ci/ubuntu-build.sh

      - name: Run tests
        if: env.BUILD_TESTS == 'ON'
        run: |
          ./ci/tests.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-${{matrix.ubuntu_version}}-${{ matrix.runner.arch }}
          path: deb
